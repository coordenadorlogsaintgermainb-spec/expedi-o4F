<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fechamento — Saint Germain</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #d6d4cc;
    --text: #1a1a1a; --text-secondary: #6b6b67; --text-tertiary: #9b9b97;
    --border: rgba(0,0,0,0.12); --border-md: rgba(0,0,0,0.22);
    --radius-md: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg-secondary: #262624; --bg-tertiary: #2e2e2c;
      --text: #f0efe8; --text-secondary: #9b9b97; --text-tertiary: #6b6b67;
      --border: rgba(255,255,255,0.1); --border-md: rgba(255,255,255,0.2);
    }
  }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text); min-height: 100vh; }

  /* ── HEADER ── */
  .header-bar {
    background: #000; padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap;
  }
  .header-left { display: flex; flex-direction: column; padding: 16px 0 0; }
  .logo-text { font-size: 22px; font-weight: 700; letter-spacing: 0.22em; color: #fff; text-transform: uppercase; }
  .logo-subtitle { font-size: 11px; font-weight: 600; letter-spacing: 0.22em; color: rgba(255,255,255,0.45); text-transform: uppercase; margin-top: 3px; margin-bottom: 2px; }

  .header-areas { display: flex; border-top: 0.5px solid rgba(255,255,255,0.15); margin-top: 8px; }
  .area-btn {
    font-size: 11px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(255,255,255,0.35); padding: 6px 20px 16px 0; margin-right: 4px;
    background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
  }
  .area-btn:hover { color: rgba(255,255,255,0.7); }
  .area-btn.active { color: rgba(255,255,255,0.9); border-bottom-color: rgba(255,255,255,0.55); }

  .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 18px 0; }
  .area-controls { display: none; align-items: center; gap: 10px; }
  .area-controls.active { display: flex; }
  .tab-controls { display: none; align-items: center; gap: 10px; }
  .tab-controls.active { display: flex; }
  .ctrl-label { font-size: 12px; color: rgba(255,255,255,0.55); }

  input[type=date], select.ctrl-select {
    font-size: 13px; padding: 7px 11px; border-radius: var(--radius-md);
    border: 0.5px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08);
    color: #fff; cursor: pointer; outline: none;
  }
  input[type=date]:focus, select.ctrl-select:focus { border-color: rgba(255,255,255,0.6); }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; }
  select.ctrl-select option { background: #222; color: #fff; }
  .btn {
    font-size: 13px; padding: 7px 15px; border-radius: var(--radius-md);
    border: 0.5px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08);
    color: #fff; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.15); }
  .btn.spinning .icon { display: inline-block; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TABS BAR (uma por área) ── */
  .tabs-bar {
    background: #000; padding: 0 32px; gap: 0;
    border-top: 0.5px solid rgba(255,255,255,0.1);
    display: none;
  }
  .tabs-bar.active { display: flex; }
  .tab-btn {
    font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 11px 22px; color: rgba(255,255,255,0.45); cursor: pointer;
    border: none; background: transparent; border-bottom: 2.5px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: rgba(255,255,255,0.75); }
  .tab-btn.active { color: #fff; border-bottom-color: #fff; }

  /* ── PAGE ── */
  .page { max-width: 1100px; margin: 0 auto; padding: 24px 20px 48px; }
  .area-page { display: none; }
  .area-page.active { display: block; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .status-bar { font-size: 12px; color: var(--text-tertiary); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
  .status-dot.loading { background: #BA7517; animation: pulse 1s infinite; }
  .status-dot.error { background: #E24B4A; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── PERIOD LABEL ── */
  .period-label {
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    margin-bottom: 16px; padding: 10px 14px;
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-md); display: inline-block;
  }

  /* ── GRID & CARDS ── */
  .grids { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
  @media (max-width: 680px) { .grids { grid-template-columns: 1fr; } }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; }
  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .sup-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: var(--radius-md); }
  .badge-blue  { background: #E6F1FB; color: #0C447C; }
  .badge-teal  { background: #E1F5EE; color: #085041; }
  .badge-amber { background: #FAEEDA; color: #633806; }
  .badge-pink  { background: #FBEAF0; color: #72243E; }
  .card-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .card-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .card-sub   { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .chart-wrap { position: relative; width: 100%; }

  /* ── TABLE ── */
  .summary-table { width: 100%; border-collapse: collapse; margin-top: 14px; font-size: 12px; }
  .summary-table thead tr { border-bottom: 0.5px solid var(--border-md); }
  .summary-table thead th { text-align: left; padding: 4px 8px; font-size: 11px; font-weight: 600; color: var(--text-secondary); }
  .summary-table thead th:last-child { text-align: right; }
  .summary-table tbody tr { border-bottom: 0.5px solid var(--border); }
  .summary-table tbody td { padding: 4px 8px; color: var(--text); }
  .summary-table tbody td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
  .row-group-header td { padding: 7px 8px 2px; font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg-secondary); border-bottom: none !important; }
  .row-subtotal td { font-weight: 600; background: var(--bg-secondary); border-top: 0.5px solid var(--border-md) !important; }
  .row-isolated td { color: var(--text-secondary); font-style: italic; }
  .summary-table tfoot tr { border-top: 1px solid var(--border-md); }
  .summary-table tfoot td { padding: 6px 8px; font-weight: 600; color: var(--text); }
  .summary-table tfoot td:last-child { text-align: right; font-variant-numeric: tabular-nums; }

  /* ── SKELETON & STATES ── */
  .skeleton { background: var(--bg-secondary); border-radius: var(--radius-lg); height: 320px; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .no-data { font-size: 13px; color: var(--text-tertiary); padding: 3rem 0; text-align: center; grid-column: 1/-1; }
  .footer { text-align: center; font-size: 11px; color: var(--text-tertiary); margin-top: 2rem; }
</style>
</head>

<script>
// ─────────────────────────────────────────────
//  CONFIGURAÇÃO
// ─────────────────────────────────────────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_QrkVvQYd0EPvdSZVPhOGCYDfHW3RDGPFUQnZqiB21g2f9f73RJyz7c-5OFcaxSSFMC-xpoVTfVXo/pub?output=csv&gid=841097549';
const HC_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR_QrkVvQYd0EPvdSZVPhOGCYDfHW3RDGPFUQnZqiB21g2f9f73RJyz7c-5OFcaxSSFMC-xpoVTfVXo/pub?output=csv&gid=1190375153';
const AUTO_REFRESH_MS = 5 * 60 * 1000;

const SUPERVISORS = [
  { match:'LUCAS - MARKETPLACE',   key:'LUCAS',    fullName:'Lucas — Marketplace',   badge:'badge-blue',  color:'#378ADD', colLabel:'Marketplaces',   mode:'lucas'    },
  { match:'VITORIA - COMERCIAL',   key:'VITORIA',  fullName:'Vitória — Comercial',   badge:'badge-teal',  color:'#1D9E75', colLabel:'Comercial',      mode:'vitoria'  },
  { match:'RICARDO - SITE',        key:'RICARDO',  fullName:'Ricardo — Site',        badge:'badge-amber', color:'#BA7517', colLabel:'Transportadoras', mode:'ricardo'  },
  { match:'GABRIELE - PÓS VENDAS', key:'GABRIELE', fullName:'Gabriele — Pós Vendas', badge:'badge-pink',  color:'#D4537E', colLabel:'Pedidos',         mode:'gabriele' },
];

const C = {
  date:'Dia do Fechamento', sup:'SUPERVISOR',
  shopee:'SHOPEE QTD. PEDIDOS:', magalu:'MAGALU QTD. PEDIDOS:', zattini:'ZATTINI QTD: PEDIDOS:',
  amazon:'AMAZON QTD. PEDIDOS:', meliSaint:'MELI SAINT QTD. PEDIDOS:', meliFlex:'MELI FLEX QTD. PEDIDOS:',
  tiktok:'TIKTOK QTD. PEDIDOS:', renner:'RENNER QTD. PEDIDOS:', shein:'SHEIN QTD. PEDIDOS:', dafiti:'DAFITI QTD. PEDIDOS:',
  correios:'CORREIOS QTD. PEDIDOS:', jadlog:'JADLOG QTD:PEDIDOS:', loggi:'LOGGI QTD. PEDIDOS:',
  estoca:'ESTOCA QTD. PEDIDOS:', totalExp:'TOTAL EXPRESS QTD. PEDIDOS:', jt:'J & T QTD. PEDIDOS:',
  atacadoQtd:'ATACADO CORREIOS QTD. PEDIDOS', atacadoIt:'ATACADO CORREIOS QTD. ITENS:',
  quiosqueBC:'QUIOSQUE BC:', quiosqueJV:'QUIOSQUE JOINVILLE:', quiosqueBN:'QUIOSQUE BLUMENAU:',
  quiosqueSP:'QUIOSQUE SP:', embaixad:'EMBAIXADORES:', extras:'EXTRAS:', influs:'INFLUS:',
  reenvCorr:'REENVIOS CORREIOS:', reenvLoggi:'REENVIOS LOGGI:',
  persCorr:'PERSONALIZADOS CORREIOS:', persLoggi:'PERSONALIZADOS LOGGI:', persEst:'PERSONALIZADOS ESTOCA:',
  persTot:'PERSONALIZADOS TOTAL EXP:', persJT:'PERSONALIZADOS J & T:',
  lentCorr:'LENTES CORREIO:', lentLoggi:'LENTES LOGGI:', lentEst:'LENTES ESTOCA:',
  lentTot:'LENTES TOTAL EXPRESS:', lentJT:'LENTES J & T:',
  devCorr:'DEVOLUÇÕES CORREIOS:', devJad:'DEVOLUÇÕES JADLOG:', devLoggi:'DEVOLUÇÕES LOGGI:',
  devMeli:'DEVOLUÇÕES MELI:', devAli:'DEVOLUÇÕES ALI EXPRESS:', devZattini:'DEVOLUÇÕES ZATTINI:',
  devEst:'DEVOLUÇÕES ESTOCA:', devShein:'DEVOLUÇÕES SHEIN:', devShopee:'DEVOLUÇÕES SHOPEE:',
  devRenner:'DEVOLUÇÕES RENNER:', devDafiti:'DEVOLUÇÕES DAFITI:', devAmazon:'DEVOLUÇÕES AMAZON:',
  devJT:'DEVOLUÇÕES J & T:', devMagalu:'DEVOLUÇÕES MAGALU:', devTiktok:'DEVOLUÇÕES TIKTOK:',
};

// ─────────────────────────────────────────────
//  ESTADO
// ─────────────────────────────────────────────
const charts = {};
let allRows = [];
let hcRows  = [];
let currentArea = 'fechamento';
const currentTab = { fechamento: 'diario', performance: 'diario', hcdia: 'diario' };
const hcCharts = {};

// ─────────────────────────────────────────────
//  UTILITÁRIOS
// ─────────────────────────────────────────────
const fmt   = n => Number(n).toLocaleString('pt-BR');
const gv    = (row, col) => { const x = parseFloat((row[col]||'').toString().replace(',','.')); return isNaN(x) ? 0 : x; };
const toISO = ds => {
  if (!ds) return '';
  ds = ds.trim().split(' ')[0];
  if (ds.includes('/')) { const [d,m,y] = ds.split('/'); return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  return ds;
};
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function weekOfMonth(iso) { return Math.ceil(parseInt(iso.split('-')[2]) / 7); }
function weekKey(iso) {
  if (!iso) return null;
  const [y, m] = iso.split('-');
  return `${y}-${m}-S${weekOfMonth(iso)}`;
}
function weekLabel(key) {
  const [y, m, s] = key.split('-');
  const wn = parseInt(s.replace('S',''));
  const startDay = (wn - 1) * 7 + 1;
  const endDay   = Math.min(wn * 7, new Date(parseInt(y), parseInt(m), 0).getDate());
  return `Semana ${wn} — ${startDay} a ${endDay}/${m}/${y}`;
}
function monthLabel(key) {
  const [y, m] = key.split('-');
  return `${MONTHS_PT[parseInt(m)-1]} de ${y}`;
}

// ─────────────────────────────────────────────
//  BUILD DATA
// ─────────────────────────────────────────────
function buildData(row, mode) {
  if (mode === 'lucas') return [
    {label:'Shopee',     val:gv(row,C.shopee)},   {label:'Magalu',     val:gv(row,C.magalu)},
    {label:'Zattini',    val:gv(row,C.zattini)},  {label:'Amazon',     val:gv(row,C.amazon)},
    {label:'Meli Saint', val:gv(row,C.meliSaint)},{label:'Meli Flex',  val:gv(row,C.meliFlex)},
    {label:'TikTok',     val:gv(row,C.tiktok)},   {label:'Renner',     val:gv(row,C.renner)},
    {label:'Shein',      val:gv(row,C.shein)},    {label:'Dafiti',     val:gv(row,C.dafiti)},
  ].filter(i => i.val > 0);

  if (mode === 'vitoria') return {

// ─────────────────────────────────────────────
//  MERGE DATA
// ─────────────────────────────────────────────
function mergeData(rows, mode) {
  if (mode === 'lucas' || mode === 'ricardo') {
    const map = {};
    rows.forEach(row => buildData(row, mode).forEach(i => { map[i.label] = (map[i.label]||0) + i.val; }));
    return Object.entries(map).filter(([,v]) => v > 0).map(([label,val]) => ({label,val}));
  }
  if (mode === 'vitoria') {
    const iso = {}, sum = {};
    rows.forEach(row => {
      const d = buildData(row, mode);
      d.isolated.forEach(i => { iso[i.label] = (iso[i.label]||0) + i.val; });
      d.sumable.forEach(i  => { sum[i.label] = (sum[i.label]||0)  + i.val; });
    });
    return {
      isolated: Object.entries(iso).filter(([,v]) => v > 0).map(([label,val]) => ({label,val})),
      sumable:  Object.entries(sum).filter(([,v]) => v > 0).map(([label,val]) => ({label,val})),
    };
  }
  if (mode === 'gabriele') {
    const gm = {};
    rows.forEach(row => {
      buildData(row, mode).forEach(grp => {
        if (!gm[grp.name]) gm[grp.name] = {};
        grp.items.forEach(i => { gm[grp.name][i.label] = (gm[grp.name][i.label]||0) + i.val; });
      });
    });
    return Object.entries(gm).map(([name,items]) => ({
      name, items: Object.entries(items).filter(([,v]) => v > 0).map(([label,val]) => ({label,val})),
    })).filter(grp => grp.items.length > 0);
  }
}

function flatItems(mode, data) {
  if (mode === 'vitoria')  return [...data.isolated, ...data.sumable];
  if (mode === 'gabriele') return data.flatMap(g => g.items);
  return data;
}

// ─────────────────────────────────────────────
//  BUILD TABLE
// ─────────────────────────────────────────────
function buildTable(mode, colLabel, data) {
  if (mode === 'lucas' || mode === 'ricardo') {
    const tot = data.reduce((s,i) => s+i.val, 0);
    return `<table class="summary-table"><thead><tr><th>${colLabel}</th><th>Qtd.</th></tr></thead>
      <tbody>${data.map(i=>`<tr><td>${i.label}</td><td>${fmt(i.val)}</td></tr>`).join('')}</tbody>
      <tfoot><tr><td>Total</td><td>${fmt(tot)}</td></tr></tfoot></table>`;
  }
  if (mode === 'vitoria') {
    const tot = data.sumable.reduce((s,i) => s+i.val, 0);
    const iR  = data.isolated.map(i=>`<tr class="row-isolated"><td>${i.label} <span style="font-size:10px;opacity:0.6">(informativo)</span></td><td>${fmt(i.val)}</td></tr>`).join('');
    const sR  = data.sumable.map(i=>`<tr><td>${i.label}</td><td>${fmt(i.val)}</td></tr>`).join('');
    return `<table class="summary-table"><thead><tr><th>${colLabel}</th><th>Qtd.</th></tr></thead>
      <tbody>${iR}${sR}</tbody><tfoot><tr><td>Total</td><td>${fmt(tot)}</td></tr></tfoot></table>`;
  }
  if (mode === 'gabriele') {
    let rows = '', grand = 0;
    data.forEach(grp => {
      const sub = grp.items.reduce((s,i) => s+i.val, 0); grand += sub;
      rows += `<tr class="row-group-header"><td colspan="2">${grp.name}</td></tr>`;
      rows += grp.items.map(i=>`<tr><td style="padding-left:16px">${i.label}</td><td>${fmt(i.val)}</td></tr>`).join('');
      rows += `<tr class="row-subtotal"><td>Total ${grp.name}</td><td>${fmt(sub)}</td></tr>`;
    });
    return `<table class="summary-table"><thead><tr><th>${colLabel}</th><th>Qtd.</th></tr></thead>
      <tbody>${rows}</tbody><tfoot><tr><td>Total Geral</td><td>${fmt(grand)}</td></tr></tfoot></table>`;
  }
}

// ─────────────────────────────────────────────
//  DRAW CHART
// ─────────────────────────────────────────────
function drawChart(key, items, sup) {
  const ctx = document.getElementById('chart-' + key);
  if (!ctx) return;
  if (charts[key]) charts[key].destroy();
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const tick   = isDark ? '#9b9b97' : '#888780';
  charts[key] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: items.map(i => i.label),
      datasets: [{ label: sup.colLabel, data: items.map(i => i.val),
        backgroundColor: sup.color + '28', borderColor: sup.color, borderWidth: 1.5, borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend:{display:false}, tooltip:{callbacks:{label: c => fmt(c.raw)}} },
      scales: {
        x: { ticks:{font:{size:10},color:tick,callback:v=>fmt(v)}, grid:{color:isDark?'rgba(255,255,255,0.07)':'rgba(136,135,128,0.12)'} },
        y: { ticks:{font:{size:10},color:tick,autoSkip:false}, grid:{display:false} }
      },
      plugins: [{ id:'datalabels-'+key, afterDatasetsDraw(ch) {
        const c2=ch.ctx;
        c2.save(); c2.font='500 10px sans-serif'; c2.fillStyle=sup.color; c2.textAlign='left'; c2.textBaseline='middle';
        ch.data.datasets.forEach((ds,di) => {
          ch.getDatasetMeta(di).data.forEach((bar,bi) => {
            if (ds.data[bi]>0) { const p=bar.getProps(['x','y'],true); c2.fillText(fmt(ds.data[bi]),p.x+4,p.y); }
          });
        });
        c2.restore();
      }}]
    }
  });
}

// ─────────────────────────────────────────────
//  RENDER CARDS
// ─────────────────────────────────────────────
function renderCards(filteredRows, gridsId, keyPrefix, emptyMsg) {
  const grids = document.getElementById(gridsId);
  grids.innerHTML = '';
  const bySupMatch = {};
  filteredRows.forEach(r => {
    const k = (r[C.sup]||'').trim().toUpperCase();
    if (!bySupMatch[k]) bySupMatch[k] = [];
    bySupMatch[k].push(r);
  });
  let rendered = 0;
  SUPERVISORS.forEach((sup, idx) => {
    const rows = bySupMatch[sup.match];
    if (!rows || !rows.length) return;
    const data = mergeData(rows, sup.mode);
    const ci   = flatItems(sup.mode, data);
    if (!ci.length) return;
    rendered++;
    const h    = Math.max(100, ci.length * 34);
    const cKey = keyPrefix + idx;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="sup-badge ${sup.badge}">${sup.key}</span>
        <span class="card-name">${sup.fullName}</span>
      </div>
      <div class="chart-wrap" style="height:${h}px">
        <canvas id="chart-${cKey}" role="img" aria-label="Gráfico ${sup.fullName}."></canvas>
      </div>
      ${buildTable(sup.mode, sup.colLabel, data)}`;
    grids.appendChild(card);
    setTimeout(() => drawChart(cKey, ci, sup), 60);
  });
  if (!rendered) grids.innerHTML = `<div class="no-data">${emptyMsg}</div>`;
}

];

  '08 - 09 hrs','09 AS 10 hrs:','10 as 11 hrs:','11 as 12 hrs:','12 as 13 hrs:',

function perfGv(row, col) {
  // Tenta match exato primeiro
  let raw = row[col];
  // Se não achou, tenta match case-insensitive e sem espaços extras
  if (raw === undefined || raw === null || raw === '') {
    const colNorm = col.toLowerCase().replace(/\s+/g,' ').trim();
    const found = Object.keys(row).find(k => k.toLowerCase().replace(/\s+/g,' ').trim() === colNorm);
    if (found) raw = row[found];
  }
  const x = parseFloat((raw||'').toString().replace(',','.'));
  return isNaN(x) ? 0 : x;
}

function perfToISO(ds) {
  if (!ds) return '';
  ds = ds.trim().split(' ')[0];
  if (ds.includes('/')) { const [d,m,y] = ds.split('/'); return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  return ds;
}

function populatePerfFilters() {
  const isos   = [...new Set(perfRows.map(r => perfToISO(r['Dia do Fechamento'])).filter(Boolean))].sort().reverse();
  const weeks  = [...new Set(isos.map(iso => weekKey(iso)).filter(Boolean))].sort().reverse();
  const months = [...new Set(isos.map(iso => iso.substring(0,7)).filter(Boolean))].sort().reverse();

  const wSel = document.getElementById('perf-week-filter');

// Agrupa linhas por linha de produção, acumula horas
function buildPerfByLine(rows) {
  const map = {};
  rows.forEach(r => {
    const linha = (r['LINHA DE PRODUÇÃO:'] || '').trim().toUpperCase();
    const nome  = (r['NOME:'] || '').trim();
    if (!linha) return;
    if (!map[linha]) map[linha] = { linha, colaboradores: {}, totals: new Array(14).fill(0) };
    const key = nome || '(sem nome)';
    if (!map[linha].colaboradores[key]) map[linha].colaboradores[key] = new Array(14).fill(0);
    PERF_COLS.forEach((col, i) => {
      const v = perfGv(r, col);
      map[linha].colaboradores[key][i] += v;
      map[linha].totals[i] += v;
    });
  });
  return Object.values(map).sort((a,b) => a.linha.localeCompare(b.linha));
}

// Linhas de produção fixas — sempre exibidas mesmo sem dados

const FIXED_LINE_BADGES = ['badge-blue','badge-teal','badge-amber','badge-pink'];

function destroyPerfCharts(prefix) {
  Object.keys(perfCharts).filter(k => k.startsWith(prefix)).forEach(k => {
    if (perfCharts[k]) { perfCharts[k].destroy(); delete perfCharts[k]; }
  });
}

const META = 100; // meta de volumes por hora

// Plugin customizado: rótulos nas barras + linha de meta
const perfMetaPlugin = {
  id: 'perfMetaPlugin',
  afterDraw(chart) {
    const { ctx, scales: { x, y }, data } = chart;
    const META_VAL = chart.options._meta || META;

    // ── Linha de meta ──
    const yMeta = y.getPixelForValue(META_VAL);
    ctx.save();
    ctx.beginPath();
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1.5;
    ctx.moveTo(x.left, yMeta);
    ctx.lineTo(x.right, yMeta);
    ctx.stroke();
    ctx.setLineDash([]);

    // Label "Meta 100"
    ctx.font = 'bold 10px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`Meta ${META_VAL}`, x.right - 2, yMeta - 2);
    ctx.restore();

    // ── Rótulos sobre as barras ──
    ctx.save();
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    data.datasets.forEach((ds, di) => {
      if (ds._isMetaLine) return; // pula dataset invisível de meta
      const meta = chart.getDatasetMeta(di);
      if (meta.hidden) return;
      meta.data.forEach((bar, bi) => {
        const val = ds.data[bi];
        if (!val || val <= 0) return;
        const { x: bx, y: by } = bar.getProps(['x', 'y'], true);
        ctx.fillStyle = val >= META_VAL ? '#6ee7b7' : '#fca5a5';
        ctx.fillText(fmt(val), bx, by - 2);
      });
    });
    ctx.restore();
  }
};

if (!Chart.registry.plugins.get('perfMetaPlugin')) {
  Chart.register(perfMetaPlugin);
}

// ─────────────────────────────────────────────
//  HC DO DIA — lógica própria (gid=1190375153)
//  Estrutura da planilha:
//    Col 0: SUPERVISOR  Col 1: COLABORADOR
//    Cols seguintes: cabeçalho = "DD/MM" (data) + dia da semana na linha abaixo
//    Valores: "PRESENTE", "FALTA", "FALTA INJUSTIFICADA" (podem vir truncados)
// ─────────────────────────────────────────────

const HC_SUPERVISORS = [
  { key:'LUCAS',    fullName:'Lucas — Marketplace',   badge:'badge-blue',  color:'#378ADD' },
  { key:'VITORIA',  fullName:'Vitória — Comercial',   badge:'badge-teal',  color:'#1D9E75' },
  { key:'RICARDO',  fullName:'Ricardo — Site',        badge:'badge-amber', color:'#BA7517' },
  { key:'GABRIELE', fullName:'Gabriele — Pós Vendas', badge:'badge-pink',  color:'#D4537E' },
];

// Converte cabeçalho "DD/MM" → "YYYY-MM-DD" usando o ano corrente
function hcColToISO(header) {
  if (!header) return '';
  const m = header.trim().match(/^(\d{1,2})\/(\d{1,2})/);
  if (!m) return '';
  const year = new Date().getFullYear();
  return `${year}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
}

// Detecta se o valor da célula é PRESENTE, FALTA ou FALTA INJUSTIFICADA
function hcStatus(val) {
  const v = (val||'').toUpperCase().trim();
  if (!v) return null;
  if (v.startsWith('FALTA INJ') || v.startsWith('FALTA_INJ')) return 'falta_inj';
  if (v.startsWith('FALT')) return 'falta';
  if (v.startsWith('PRES')) return 'presente';
  return null;
}

// Retorna todas as colunas de data presentes no CSV e seus ISOs
function hcGetDateCols(rows) {
  if (!rows.length) return [];
  return Object.keys(rows[0])
    .map(k => ({ col: k, iso: hcColToISO(k) }))
    .filter(c => c.iso);
}

// Retorna datas únicas disponíveis no CSV (para popular o filtro)
function hcAvailableDates(rows) {
  return [...new Set(hcGetDateCols(rows).map(c => c.iso))].sort().reverse();
}

// Dado o conjunto completo de hcRows e uma data ISO, calcula por supervisor:
//   fixo      = nº de colaboradores cadastrados (linhas com supervisor definido)
//   presentes = nº com PRESENTE na data
//   faltantes = nº com FALTA ou FALTA INJUSTIFICADA na data
//   faltaInj  = nº com FALTA INJUSTIFICADA
//   semRegistro = nº sem valor na data
function buildHcData(dateISO) {
  const result = {};
  HC_SUPERVISORS.forEach(s => {
    result[s.key] = { fixo:0, presentes:0, faltantes:0, faltaInj:0, semRegistro:0, colaboradores:[] };
  });

  // Achar a coluna que corresponde à data selecionada
  const dateCols = hcGetDateCols(hcRows).filter(c => c.iso === dateISO).map(c => c.col);

  hcRows.forEach(row => {
    // Identificar supervisor da linha
    const supRaw = (row['SUPERVISOR'] || row['Supervisor'] ||
      Object.values(row).find((_,i) => i===0) || '').toUpperCase().trim();
    if (!supRaw) return;

    const sup = HC_SUPERVISORS.find(s => supRaw.includes(s.key));
    if (!sup) return;

    const colab = row['COLABORADOR'] || row['Colaborador'] ||
      Object.values(row)[1] || '';
    if (!colab.trim()) return; // linha vazia

    result[sup.key].fixo++;
    result[sup.key].colaboradores.push(colab.trim());

    if (!dateCols.length) {
      result[sup.key].semRegistro++;
      return;
    }

    // Pegar o status da data (pode haver múltiplas colunas com o mesmo DD/MM por duplicidade)
    let status = null;
    for (const col of dateCols) {
      status = hcStatus(row[col]);
      if (status) break;
    }

    if (status === 'presente')  result[sup.key].presentes++;
    else if (status === 'falta')     result[sup.key].faltantes++;
    else if (status === 'falta_inj') { result[sup.key].faltantes++; result[sup.key].faltaInj++; }
    else result[sup.key].semRegistro++;
  });

  return result;
}

function destroyHcCharts() {
  Object.keys(hcCharts).forEach(k => { if (hcCharts[k]) { hcCharts[k].destroy(); delete hcCharts[k]; } });
}

function drawHcDoughnut(cKey, data, color) {
  const ctx = document.getElementById(`hcchart-${cKey}`);
  if (!ctx) return;
  if (hcCharts[cKey]) { hcCharts[cKey].destroy(); delete hcCharts[cKey]; }
  const { presentes, faltantes, faltaInj, fixo } = data;
  // faltantes já inclui faltaInj — separar falta simples
  const faltaSimples = faltantes - faltaInj;
  const total = presentes + faltantes;
  const hasData = total > 0;

  const chartData    = hasData ? [presentes, faltaSimples, faltaInj] : [1, 0, 0];
  const bgColors     = hasData
    ? ['rgba(74,222,128,0.75)', 'rgba(248,113,113,0.75)', 'rgba(192,132,252,0.75)']
    : ['rgba(120,120,120,0.2)', 'rgba(0,0,0,0)', 'rgba(0,0,0,0)'];
  const borderColors = hasData
    ? ['rgba(74,222,128,1)', 'rgba(248,113,113,1)', 'rgba(192,132,252,1)']
    : ['rgba(120,120,120,0.3)', 'rgba(0,0,0,0)', 'rgba(0,0,0,0)'];

  hcCharts[cKey] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Presentes', 'Faltantes', 'F. Injust.'],
      datasets: [{
        data: chartData,
        backgroundColor: bgColors,
        borderColor: borderColors,
        borderWidth: 1.5,
        hoverOffset: 4,
      }]
    },
    options: {
      cutout: '68%',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: c => c.raw > 0 ? ` ${c.label}: ${c.raw}` : null }
        }
      }
    }
  });
}

  const lbl = document.getElementById('period-label-fech-mensal');
  lbl.style.display = 'inline-block'; lbl.textContent = '📅 ' + monthLabel(mk);
  renderCards(allRows.filter(r => { const iso = toISO(r[C.date]); return iso && iso.substring(0,7) === mk; }), 'grids-fech-mensal', 'fm', 'Nenhum dado encontrado para este mês.');
}

function renderFechCurrent() {
  const tab = currentTab.fechamento;
  if (tab === 'diario')  renderFechDiario(document.getElementById('fech-date-filter').value);
  if (tab === 'semanal') { const v = document.getElementById('fech-week-filter').value;  if (v) renderFechSemanal(v); }
  if (tab === 'mensal')  { const v = document.getElementById('fech-month-filter').value; if (v) renderFechMensal(v); }
}

// ─────────────────────────────────────────────
//  POPULAR FILTROS
// ─────────────────────────────────────────────
function populateFilters() {
  const isos   = [...new Set(allRows.map(r => toISO(r[C.date])).filter(Boolean))].sort().reverse();
  const weeks  = [...new Set(isos.map(iso => weekKey(iso)).filter(Boolean))].sort().reverse();
  const months = [...new Set(isos.map(iso => iso.substring(0,7)).filter(Boolean))].sort().reverse();

  ['fech','hc'].forEach(prefix => {
    const wSel = document.getElementById(`${prefix}-week-filter`);
    const mSel = document.getElementById(`${prefix}-month-filter`);
    if (!wSel || !mSel) return;
    const prevW = wSel.value, prevM = mSel.value;
    wSel.innerHTML = weeks.map(w  => `<option value="${w}">${weekLabel(w)}</option>`).join('');
    mSel.innerHTML = months.map(m => `<option value="${m}">${monthLabel(m)}</option>`).join('');
    wSel.value = weeks.includes(prevW)   ? prevW  : (weeks[0]  || '');
    mSel.value = months.includes(prevM)  ? prevM  : (months[0] || '');
  });
}

// ─────────────────────────────────────────────
//  STATUS
// ─────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('status-dot').className = 'status-dot' + (state==='loading'?' loading':state==='error'?' error':'');
  document.getElementById('status-text').textContent = text;
}

// ─────────────────────────────────────────────
//  LOAD DATA
// ─────────────────────────────────────────────
function loadData(silent) {
  if (!silent) {
    setStatus('loading', 'Buscando dados da planilha...');
    document.getElementById('fech-btn-refresh').classList.add('spinning');
  }
  Papa.parse(CSV_URL + '&cachebust=' + Date.now(), {
    download: true, header: true, skipEmptyLines: true,
    complete(results) {
      allRows = results.data;
      const isos = [...new Set(allRows.map(r => toISO(r[C.date])).filter(Boolean))].sort().reverse();

      const fechInp = document.getElementById('fech-date-filter');
      fechInp.value = isos.includes(fechInp.value) ? fechInp.value : (isos[0] || '');

      populateFilters();
      renderFechCurrent();

      setStatus('ok', `Atualizado em ${new Date().toLocaleString('pt-BR')}`);
      document.getElementById('fech-btn-refresh').classList.remove('spinning');
    },
    error() {
      setStatus('error', 'Erro ao buscar dados. Verifique se a planilha está publicada.');
      document.getElementById('fech-btn-refresh').classList.remove('spinning');
      ['grids-fech-diario','grids-fech-semanal','grids-fech-mensal'].forEach(id => {
        document.getElementById(id).innerHTML = '<div class="no-data">Não foi possível carregar os dados.</div>';
      });
    }
  });
}

// ─────────────────────────────────────────────
//  SWITCH ÁREA
// ─────────────────────────────────────────────
function switchArea(area) {
  currentArea = area;
  document.querySelectorAll('.area-btn').forEach(b    => b.classList.toggle('active', b.dataset.area === area));
  document.querySelectorAll('.area-page').forEach(p   => p.classList.toggle('active', p.id === 'page-' + area));
  document.querySelectorAll('.tabs-bar').forEach(t    => t.classList.toggle('active', t.id === 'tabs-' + area));
  document.querySelectorAll('.area-controls').forEach(c => c.classList.toggle('active', c.id === 'hctrl-' + area));
  if (area === 'performance') renderPerfCurrent();
  if (area === 'hcdia') renderHcCurrent();
}

// ─────────────────────────────────────────────
//  SWITCH TAB
// ─────────────────────────────────────────────
function switchTab(area, tab) {
  currentTab[area] = tab;
  const prefixMap = { fechamento: 'fech', performance: 'perf', hcdia: 'hc' };
  const prefix = prefixMap[area] || area;

  // Botões
  document.querySelectorAll(`#tabs-${area} .tab-btn`).forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  // Painéis
  document.querySelectorAll(`#page-${area} .tab-panel`).forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${prefix}-${tab}`).classList.add('active');
  // Controles header
  document.querySelectorAll(`#hctrl-${area} .tab-controls`).forEach(c => c.classList.remove('active'));
  document.getElementById(`hctrl-${prefix}-${tab}`).classList.add('active');

  if (area === 'fechamento') renderFechCurrent();
  if (area === 'performance') renderPerfCurrent();
  if (area === 'hcdia') renderHcCurrent();
}

// ─────────────────────────────────────────────
//  EVENTOS
// ─────────────────────────────────────────────
document.querySelectorAll('.area-btn').forEach(btn => btn.addEventListener('click', () => switchArea(btn.dataset.area)));
document.querySelectorAll('.tab-btn').forEach(btn  => btn.addEventListener('click', () => switchTab(btn.dataset.area, btn.dataset.tab)));

document.getElementById('fech-date-filter').addEventListener('change',  function() { renderFechDiario(this.value); });
document.getElementById('fech-week-filter').addEventListener('change',  function() { if (this.value) renderFechSemanal(this.value); });
document.getElementById('fech-month-filter').addEventListener('change', function() { if (this.value) renderFechMensal(this.value); });

document.getElementById('perf-date-filter').addEventListener('change',  function() { renderPerfDiario(this.value); });
document.getElementById('perf-week-filter').addEventListener('change',  function() { if (this.value) renderPerfSemanal(this.value); });
document.getElementById('perf-month-filter').addEventListener('change', function() { if (this.value) renderPerfMensal(this.value); });

document.getElementById('hc-date-filter').addEventListener('change',  function() { renderHcDiario(this.value); });
document.getElementById('hc-week-filter').addEventListener('change',  function() { if (this.value) renderHcSemanal(this.value); });
document.getElementById('hc-month-filter').addEventListener('change', function() { if (this.value) renderHcMensal(this.value); });

document.getElementById('fech-btn-refresh').addEventListener('click', () => loadData(false));
document.getElementById('perf-btn-refresh').addEventListener('click', () => loadPerfData(false));
document.getElementById('hc-btn-refresh').addEventListener('click',   () => loadHcData(false));

// Inicializa
loadData(false);
loadPerfData(false);
loadHcData(false);
setInterval(() => loadData(true), AUTO_REFRESH_MS);
setInterval(() => loadPerfData(true), AUTO_REFRESH_MS);
setInterval(() => loadHcData(true), AUTO_REFRESH_MS);
</script>
</body>
</html>
